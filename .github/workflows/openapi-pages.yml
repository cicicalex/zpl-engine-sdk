# Publish docs/ (OpenAPI + static assets) to GitHub Pages.
# Repo Settings → Pages → Build and deployment → Source: GitHub Actions.
# Public URL: https://cicicalex.github.io/zpl-engine-sdk/openapi.yaml
name: OpenAPI Pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/openapi-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: openapi-pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@v4
